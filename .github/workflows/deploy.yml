name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clear cache and dist
        run: |
          rm -rf .angular/cache
          rm -rf dist

      - name: Build Angular production
        run: npm run build
        env:
          NG_BUILD_BASE_HREF: /Portfolio/

      - name: Verify build
        run: |
          ls -la dist/portfolio/browser/
          # Test básico
          npx http-server dist/portfolio/browser -p 8080 -c-1 --silent &
          sleep 3
          curl -f http://localhost:8080/Portfolio/ || (echo "Build failed" && exit 1)
          kill %1

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist/portfolio/browser
          clean: true
