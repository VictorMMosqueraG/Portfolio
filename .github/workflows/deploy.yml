name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clear cache and dist
        run: |
          rm -rf .angular/cache
          rm -rf dist

      - name: Build Angular production
        run: npm run build

      - name: Verify build files
        run: |
          ls -la dist/portfolio/browser/
          grep -o '<base href="/Portfolio/">' dist/portfolio/browser/index.html || echo "Base href OK?"
          head -20 dist/portfolio/browser/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist/portfolio/browser
          clean: true
