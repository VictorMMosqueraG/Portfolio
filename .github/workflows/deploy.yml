name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Clean
        run: rm -rf .angular/cache dist

      - name: Build
        run: npm run build  # Asegura --base-href "/Portfolio/" en package.json

      - name: Fix SPA routing
        run: cp dist/portfolio/browser/index.html dist/portfolio/browser/404.html

      - name: Verify build
        run: |
          ls -la dist/portfolio/browser/
          echo "=== index.html head ==="
          head -20 dist/portfolio/browser/index.html

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist/portfolio/browser
          clean: true
