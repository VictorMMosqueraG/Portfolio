name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para poder borrar/crear ramas remotas

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Clean local build
        run: rm -rf .angular/cache dist

      - name: Build
        run: npm run build  # ng build --configuration production --base-href "/Portfolio/"

      - name: Fix SPA routing
        run: cp dist/portfolio/browser/index.html dist/portfolio/browser/404.html

      - name: Delete remote gh-pages branch (if exists)
        run: |
          git fetch origin
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git push origin --delete gh-pages
          else
            echo "gh-pages does not exist yet, nothing to delete"
          fi

      - name: Deploy fresh to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages           # Se vuelve a crear limpia
          folder: dist/portfolio/browser
          clean: true                # Limpia el contenido del branch recién creado
